<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMU Canteen | Professional Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030712;
            --accent-blue: #38bdf8;
            --accent-indigo: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированный живой фон */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
            animation: move 20s infinite alternate;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(20deg); }
        }

        .header {
            padding: clamp(60px, 10vh, 100px) 20px 40px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        .header p {
            color: var(--accent-blue);
            font-size: clamp(10px, 2vw, 12px);
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 15px;
            animation: slideDown 1s ease-out;
        }

        .header h1 {
            font-size: clamp(40px, 15vw, 90px);
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff 40%, #475569);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: scaleIn 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .container {
            padding: 0 20px 100px;
            max-width: 900px; /* Увеличил ширину для десктопа */
            margin: 0 auto;
            display: grid;
            gap: 24px;
            width: 100%; /* Занимает всю доступную ширину до макс-лимита */
        }

        .menu-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border-radius: clamp(24px, 5vw, 40px);
            padding: clamp(12px, 3vw, 20px);
            display: flex;
            gap: clamp(15px, 4vw, 30px);
            align-items: center;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: cardFade 0.8s ease backwards;
            cursor: pointer;
        }

        @keyframes cardFade {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-8px) scale(1.01);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.4),
                0 0 20px rgba(56, 189, 248, 0.1);
        }

        .img-wrapper {
            width: clamp(110px, 25vw, 160px);
            height: clamp(130px, 30vw, 180px);
            flex-shrink: 0;
            border-radius: clamp(18px, 4vw, 32px);
            overflow: hidden;
            background: #0f172a;
            position: relative;
        }

        .item-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .menu-card:hover .item-img {
            transform: scale(1.15);
        }

        .item-info {
            flex: 1;
            padding: 5px 0;
        }

        .item-info h3 {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 600;
            margin-bottom: clamp(10px, 3vw, 15px);
            color: #fff;
            letter-spacing: -0.5px;
        }

        .price-list {
            display: grid;
            gap: 10px;
        }

        .price-tag {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px clamp(12px, 3vw, 20px);
            border-radius: clamp(12px, 3vw, 18px);
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .menu-card:hover .price-tag {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .price-tag .vol {
            font-size: clamp(11px, 2.5vw, 13px);
            color: var(--text-dim);
            font-weight: 500;
        }

        .price-tag .amt {
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: 700;
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .loader {
            text-align: center;
            padding: 100px 0;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Адаптив для мобильных устройств */
        @media (max-width: 600px) {
            .container { padding: 0 15px 60px; }
            .menu-card { 
                flex-direction: column; 
                text-align: center;
                padding: 15px;
            }
            .img-wrapper { 
                width: 100%; 
                height: 240px; 
            }
            .item-info { 
                padding: 0; 
                width: 100%;
            }
            .price-list {
                max-width: 300px;
                margin: 0 auto;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <header class="header">
        <p>Premium Canteen Experience</p>
        <h1>BMU<br>CANTEEN</h1>
    </header>

    <main class="container" id="menu-container">
        <div class="loader">ПОДГРУЖАЕМ МЕНЮ...</div>
    </main>

    <script>
        const SHEET_ID = '1GqqzNX3FQlyi61DO93hkc-Z_Iw5RcJJXmvANP8LC8rA';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        async function initMenu() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').map(r => r.trim()).filter(r => r.length > 0);
                
                const container = document.getElementById('menu-container');
                container.innerHTML = '';

                // Если таблица пустая или содержит только заголовки, используем данные пользователя
                const hasRealData = rows.some(r => !r.includes('Название') && !r.includes('Столбец') && r.split(',').length > 1);
                
                const menuToRender = hasRealData ? rows : [
                    ',Лимонад,350мл - 20.000 / 500мл - 25.000 / 700мл - 30.000,https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=400&auto=format&fit=crop',
                    ',Айсти,350мл - 25.000 / 500мл - 30.000 / 700мл - 35.000,https://images.unsplash.com/photo-1499638673689-79a0b5115d87?q=80&w=400&auto=format&fit=crop',
                    ',Горячий чай,400мл - 25.000 / 500мл - 30.000,https://images.unsplash.com/photo-1544145945-f904253d0c7b?q=80&w=400&auto=format&fit=crop'
                ];

                menuToRender.forEach((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    
                    if (cols.filter(c => c.length > 0).length < 2) return;
                    if (row.includes('Название') || row.includes('Столбец')) return;

                    const name = cols[1] || cols[0];
                    const prices = cols[2] || cols[1];
                    const img = cols[3] || cols[2] || '';

                    if (!name || name.length < 2) return;

                    // Улучшенная конвертация Google Drive ссылок
                    function getDirectDriveLink(link) {
                        if (link.includes('drive.google.com')) {
                            const match = link.match(/\/d\/([^/]+)/) || link.match(/id=([^&]+)/);
                            if (match && match[1]) {
                                return `https://lh3.googleusercontent.com/d/${match[1]}`;
                            }
                        }
                        return link;
                    }

                    const displayImg = (img && img.startsWith('http')) ? getDirectDriveLink(img) : 'https://images.unsplash.com/photo-1544145945-f904253d0c7b?q=80&w=200&auto=format&fit=crop';
                    const placeholderSvg = `data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22120%22%20height%3D%22140%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%231e293b%22/%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-family%3D%22sans-serif%22%20font-size%3D%2216%22%20fill%3D%22%2338bdf8%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3EBMU%3C/text%3E%3C/svg%3E`;

                    const card = document.createElement('div');
                    card.className = 'menu-card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    card.innerHTML = `
                        <div class="img-wrapper">
                            <img src="${displayImg}" class="item-img" alt="${name}" onerror="this.src='${placeholderSvg}'">
                        </div>
                        <div class="item-info">
                            <h3>${name}</h3>
                            <div class="price-list">
                                ${prices.split('/').map(p => {
                                    const parts = p.split('-');
                                    const vol = parts[0] ? parts[0].trim() : '';
                                    const prc = parts[1] ? parts[1].trim() : '';
                                    if(!vol && !prc) return '';
                                    return `
                                        <div class="price-tag">
                                            <span class="vol">${vol}</span>
                                            <span class="amt">${prc}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                if (container.children.length === 0) {
                    container.innerHTML = '<div class="loader">МЕНЮ ПОКА ПУСТО</div>';
                }

            } catch (e) {
                console.error(e);
                document.getElementById('menu-container').innerHTML = '<div class="loader">ОШИБКА ЗАГРУЗКИ. ПРОВЕРЬТЕ ТАБЛИЦУ.</div>';
            }
        }

        initMenu();
    </script>
</body>

</html>
